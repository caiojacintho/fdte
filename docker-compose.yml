services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planehab
      POSTGRES_USER: ${POSTGRES_USER:-planehab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planehab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-planehab} -d planehab']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  adminer:
    image: adminer:latest
    ports:
      - '8081:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
